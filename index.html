<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        /* Modern, minimal styling to center the image */
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
        }
        .image-container {
            max-width: 80%;
            max-height: 90vh;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        img {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="image-container">
        <img src="image.png" alt="Displayed PNG Image">
    </div>

</body>
</html>
